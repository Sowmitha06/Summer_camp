margin:0;
padding:0;
box-sizing:border-box;

}

/* BACKGROUND */
body{
min-height:100vh;
background:
linear-gradient(rgba(255,255,255,.35),rgba(255,255,255,.35)),
url("banner.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

padding-top:90px;
}

/* NAVBAR */
.navbar{
border-radius:20px;
margin:15px 30px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.navbar-brand{
font-size:30px;
font-weight:bold;
color:#2563eb !important;
}

.nav-link{
color:#2563eb !important;
font-weight:500;
}

.nav-link:hover{
color:#1d4ed8 !important;
}

/* CONTAINER */
.container{
width:90%;
max-width:700px;
margin:80px auto;
text-align:center;
background:rgba(255,255,255,.25);
backdrop-filter:blur(15px);
padding:50px;
border-radius:25px;
border:1px solid rgba(255,255,255,.4);
box-shadow:0 8px 30px rgba(0,0,0,.2);
}

/* ICON */
.icon{
font-size:90px;
margin-bottom:20px;
}

/* TEXT */
h1{
color:#16a34a;
margin-bottom:15px;
}

p{
font-size:20px;
color:#0f172a;
line-height:1.8;
margin-bottom:20px;
}

/* BUTTON */
.btn{
padding:10px 25px;
border-radius:10px;
}

/* FOOTER */
footer{
margin-top:25px;
color:#0f172a;
font-size:14px;
}

/* ========================= */
/* MOBILE RESPONSIVE FIX */
/* ========================= */
@media (max-width: 991px) {

  .navbar{
    margin:10px;
  }

  .navbar-nav {
    text-align:center;
    padding:10px 0;
  }

  .navbar-nav .nav-item {
    margin:8px 0;
  }

  .navbar-collapse {
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    border-radius:15px;
    margin-top:10px;
    padding:15px;
  }

  .nav-link {
    display:block;
    padding:10px;
    border-radius:10px;
  }

  .nav-link:hover {
    background:#e0f2fe;
  }

  .container{
    padding:25px;
    margin:60px auto;
  }

  .icon{
    font-size:70px;
  }

  h1{
    font-size:24px;
  }

  p{
    font-size:16px;
  }

}

</style>
