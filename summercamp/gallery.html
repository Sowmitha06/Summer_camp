<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Camp Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* BACKGROUND */
body{
    min-height:100vh;
    background:
    linear-gradient(rgba(255,255,255,.35),rgba(255,255,255,.35)),
    url("banner.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    padding-top:90px;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
background:rgba(255,255,255,.25);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.4);
border-radius:25px;
padding:35px;
box-shadow:0 8px 30px rgba(0,0,0,.15);
}

/* TITLE */
h1{
text-align:center;
color:#2563eb;
margin-bottom:30px;
font-size:42px;
}

/* CAROUSEL */
#campGallery{
max-width:900px;
margin:auto;
}

.carousel-item img{
width:100%;
height:500px;
object-fit:cover;
border-radius:20px;
transition: transform 0.4s ease;
}

/* arrows */
.carousel-control-prev-icon,
.carousel-control-next-icon{
background-color:#2563eb;
border-radius:50%;
padding:20px;
}

.carousel-control-prev,
.carousel-control-next{
width:8%;
}

/* NAVBAR */
.navbar{
border-radius:20px;
margin:15px 30px;
}

.navbar-brand{
font-size:30px;
font-weight:bold;
color:#2563eb !important;
}

.nav-link{
color:#2563eb !important;
font-weight:500;
}

.nav-link:hover{
color:#1d4ed8 !important;
}

/* FOOTER */
footer{
text-align:center;
margin-top:30px;
color:#0f172a;
font-size:15px;
}

/* ========================= */
/* MOBILE RESPONSIVE FIX */
/* ========================= */
@media (max-width: 991px) {

  .navbar-nav {
    text-align: center;
    padding: 10px 0;
  }

  .navbar-nav .nav-item {
    margin: 8px 0;
  }

  .navbar-collapse {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    margin-top: 10px;
    padding: 15px;
  }

  .nav-link {
    display: block;
    padding: 10px;
    border-radius: 10px;
  }

  .nav-link:hover {
    background: #e0f2fe;
  }

  .carousel-item img {
    height: 250px;
  }
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow">

  <div class="container-fluid px-5">

    <a class="navbar-brand fw-bold" href="index.html">
      Sunshine Camp
    </a>

    <button class="navbar-toggler border-0 shadow-none"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="about.html">About</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="programs.html">Programs</a>
        </li>

        <li class="nav-item">
          <a class="nav-link active fw-bold" href="gallery.html">Gallery</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="registration.html">Registration</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="contact.html">Contact</a>
        </li>

      </ul>

    </div>

  </div>
</nav>

<!-- CONTENT -->
<div class="container">

<h1>Camp Gallery</h1>

<div id="campGallery" class="carousel slide">

<div class="carousel-indicators">

<button type="button" data-bs-target="#campGallery" data-bs-slide-to="0" class="active"></button>
<button type="button" data-bs-target="#campGallery" data-bs-slide-to="1"></button>
<button type="button" data-bs-target="#campGallery" data-bs-slide-to="2"></button>

</div>

<div class="carousel-inner">

<div class="carousel-item active">
<img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=1200&q=80" class="img-fluid" alt="Leadership Camp">
</div>

<div class="carousel-item">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80" class="img-fluid" alt="Camping"></div>

<div class="carousel-item">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1200&q=80" class="img-fluid" alt="Nature Camp"></div>


</div>

<button class="carousel-control-prev" type="button" data-bs-target="#campGallery" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#campGallery" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

<footer>
© 2026 Sunshine Summer Camp
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
